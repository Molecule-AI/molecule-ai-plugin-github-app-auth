name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Canonical plugin validation: spec validation + secret scan, run via
  # the org-wide reusable workflow. Every other Molecule plugin repo
  # uses this; the two Go plugins (this one + gh-identity) used to skip
  # it because their existing ci.yml only ran Go-specific test/vet.
  # That meant a plugin spec misconfig or a committed credential could
  # ship a release without ever being scanned (the security-relevant
  # gap in the publish pipeline).
  validate:
    uses: Molecule-AI/molecule-ci/.github/workflows/validate-plugin.yml@main

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test internal package (-race)
        # The internal/githubapp package is self-contained; it's where all
        # the real logic + all the tests live. The cmd/ + pluginloader/
        # packages require the molecule-core platform module to compile
        # (for provisionhook.Registry) — that's integration territory,
        # validated by the platform's own CI when the plugin is pulled in.
        run: go test ./internal/... -race -count=1

      - name: Vet internal package
        run: go vet ./internal/...
